<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Glass Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --accent: #F5CA73;
    --fg: #FFFFFF;
    /* Glassmorphism Variables */
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-glow: rgba(245, 202, 115, 0.1);
  }

  body {
    margin: 0; padding: 15px;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    height: 140px;
    width: 900px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .dashboard-wrapper {
    display: flex;
    width: 100%;
    height: 110px;
    gap: 15px;
    align-items: stretch;
  }

  /* --- Glass Panel Base --- */
  .panel {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 14px; /* Soft square, not a pill */
    padding: 15px 25px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .panel:hover {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 20px var(--glass-glow);
  }

  /* --- CLOCK PANEL --- */
  .clock-panel { min-width: 200px; }
  #time { font-size: 48px; font-weight: 900; line-height: 1; letter-spacing: -3px; }
  .clock-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
  #ampm { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  #date { font-size: 12px; font-weight: 500; opacity: 0.6; }

  /* --- WEATHER CENTER --- */
  .weather-panel { flex-grow: 1; position: relative; overflow: hidden; }
  .weather-main { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; }
  #w-icon { font-size: 42px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
  #temp { font-size: 42px; font-weight: 900; color: var(--accent); line-height: 1; }
  
  .forecast-row {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 10px;
  }
  .f-item { display: flex; align-items: center; gap: 6px; }
  .f-day { font-size: 10px; font-weight: 800; opacity: 0.4; text-transform: uppercase; }
  .f-icon { font-size: 14px; }
  .f-hi { font-size: 11px; font-weight: 700; }

  /* --- STUDIO TAG --- */
  .studio-panel {
    min-width: 140px;
    text-align: right;
    align-items: flex-end;
  }
  .studio-label { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .studio-name { font-size: 14px; font-weight: 600; opacity: 0.8; }
  .live-tag {
    margin-top: 10px;
    font-size: 9px;
    background: rgba(255, 255, 255, 0.1);
    padding: 3px 8px;
    border-radius: 4px;
    color: var(--accent);
    font-weight: 700;
  }
</style>
</head>
<body>

  <div class="dashboard-wrapper">
    <div class="panel clock-panel">
      <div id="time">00:00</div>
      <div class="clock-meta">
        <span id="ampm">PM</span>
        <span id="date">Thursday, March 26</span>
      </div>
    </div>

    <div class="panel weather-panel">
      <div class="weather-main">
        <div id="w-icon">☀️</div>
        <div id="temp">--°</div>
        <div style="flex-grow:1"></div>
        <div id="forecast-row" class="forecast-row" style="width: 100%; border:none; padding:0; justify-content: flex-end; gap:20px;">
          </div>
      </div>
      <div id="bottom-stats" style="display:flex; gap:15px; font-size:10px; font-weight:700; opacity:0.5; text-transform:uppercase;">
         <span>Humidity: <span id="hum" style="color:#FFF">--%</span></span>
         <span>Wind: <span id="wind" style="color:#FFF">--km/h</span></span>
         <span style="flex-grow:1"></span>
         <span id="cond" style="color:var(--accent)">Clear Sky</span>
      </div>
    </div>

    <div class="panel studio-panel">
      <span class="studio-label">Location</span>
      <span class="studio-name">Vaughan</span>
      <span class="studio-name">Studio • ON</span>
      <div class="live-tag">MTA CANADA</div>
    </div>
  </div>

<script>
  function updateClock() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    let ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    m = m < 10 ? '0' + m : m;
    document.getElementById('time').innerText = `${h}:${m}`;
    document.getElementById('ampm').innerText = ampm;
    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);
  }

  const LAT = 43.8361, LON = -79.4982;
  const W_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max&timezone=auto&forecast_days=6`;

  function getIcon(code) {
    if (code === 0) return "☀️";
    if (code <= 3) return "☁️";
    if (code <= 48) return "🌫️";
    if (code <= 67) return "🌧️";
    if (code <= 77) return "❄️";
    return "⛈️";
  }

  async function updateWeather() {
    try {
      const res = await fetch(W_URL);
      const data = await res.json();
      document.getElementById('temp').innerText = Math.round(data.current.temperature_2m) + "°";
      document.getElementById('w-icon').innerText = getIcon(data.current.weather_code);
      document.getElementById('hum').innerText = data.current.relative_humidity_2m + "%";
      document.getElementById('wind').innerText = Math.round(data.current.wind_speed_10m) + "km/h";

      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      let fHtml = '';
      for (let i = 1; i <= 4; i++) {
        const d = new Date(data.daily.time[i] + 'T00:00');
        fHtml += `
          <div class="f-item">
            <span class="f-day">${days[d.getDay()]}</span>
            <span class="f-icon">${getIcon(data.daily.weather_code[i])}</span>
            <span class="f-hi">${Math.round(data.daily.temperature_2m_max[i])}°</span>
          </div>`;
      }
      document.getElementById('forecast-row').innerHTML = fHtml;
    } catch(e) { console.error(e); }
  }

  setInterval(updateClock, 1000);
  updateClock();
  updateWeather();
  setInterval(updateWeather, 1800000);
</script>
</body>
</html>
