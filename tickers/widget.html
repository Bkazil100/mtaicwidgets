<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Cohesive Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --accent: #F5CA73;
    --fg: #FFFFFF;
    --glass-bright: rgba(255, 255, 255, 0.05);
    --glass-dim: rgba(255, 255, 255, 0.02);
    --border: rgba(245, 202, 115, 0.15);
  }

  body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    height: 80px;
    width: 100%;
    overflow: hidden;
  }

  #main-container {
    display: flex;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: flex-start;
    box-sizing: border-box;
    background: linear-gradient(90deg, var(--bg) 0%, var(--glass-dim) 50%, var(--bg) 100%);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  /* --- LEFT: Clock & Branding --- */
  .brand-section {
    display: flex;
    align-items: center;
    padding: 0 35px;
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .clock-wrap { display: flex; align-items: baseline; gap: 8px; }
  #time { font-size: 42px; font-weight: 800; color: var(--fg); letter-spacing: -2px; line-height: 1; }
  #ampm { font-size: 14px; font-weight: 600; color: var(--accent); text-transform: uppercase; }

  /* --- MIDDLE: Date & Context --- */
  .context-section {
    padding: 0 35px;
    display: flex;
    flex-direction: column;
  }
  #date { font-size: 16px; font-weight: 700; color: var(--fg); white-space: nowrap; margin-bottom: 2px; }
  .studio-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; }

  /* --- RIGHT: Integrated Weather & Forecast --- */
  .weather-forecast-block {
    display: flex;
    align-items: center;
    background: var(--glass-bright);
    height: 100%;
    margin-left: auto; /* Pushes to the right but stays in the adaptive flow */
    padding: 0 40px;
    border-left: 1px solid var(--border);
    position: relative;
  }

  /* Current Focus */
  .current-focus {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-right: 35px;
  }
  #w-icon-main { font-size: 34px; filter: drop-shadow(0 0 10px rgba(245, 202, 115, 0.2)); }
  .cur-text { line-height: 1; }
  #temp-main { font-size: 30px; font-weight: 800; color: var(--accent); }
  #cond-main { font-size: 9px; font-weight: 700; color: var(--fg); text-transform: uppercase; display: block; margin-top: 3px; opacity: 0.6; }

  /* Unified Forecast Strip */
  .forecast-strip {
    display: flex;
    gap: 22px;
    padding-left: 30px;
    border-left: 1px solid rgba(255,255,255,0.1);
  }
  .f-day { display: flex; flex-direction: column; align-items: center; transition: transform 0.2s ease; }
  .f-day:hover { transform: translateY(-2px); }
  .f-label { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
  .f-icon { font-size: 18px; margin-bottom: 4px; }
  .f-temp-wrap { font-size: 11px; font-weight: 700; display: flex; gap: 4px; }
  .f-hi { color: #FFF; }
  .f-lo { color: rgba(255,255,255,0.3); }

</style>
</head>
<body>

  <div id="main-container">
    <div class="brand-section">
      <div class="clock-wrap">
        <span id="time">--:--</span>
        <span id="ampm">--</span>
      </div>
    </div>

    <div class="context-section">
      <span id="date">--</span>
      <span class="studio-label">Vaughan Studio • Canada</span>
    </div>

    <div class="weather-forecast-block">
      <div class="current-focus">
        <div id="w-icon-main">--</div>
        <div class="cur-text">
          <span id="temp-main">--°</span>
          <span id="cond-main">Loading</span>
        </div>
      </div>

      <div id="forecast-strip" class="forecast-strip">
        </div>
    </div>
  </div>

<script>
  function updateClock() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    let ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    m = m < 10 ? '0' + m : m;
    document.getElementById('time').innerText = `${h}:${m}`;
    document.getElementById('ampm').innerText = ampm;
    const options = { weekday: 'long', month: 'short', day: 'numeric' };
    document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);
  }

  const LAT = 43.8361, LON = -79.4982;
  const W_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=6`;

  function getIcon(code) {
    if (code === 0) return "☀️";
    if (code <= 3) return "☁️";
    if (code <= 48) return "🌫️";
    if (code <= 67) return "🌧️";
    if (code <= 77) return "❄️";
    return "⛈️";
  }

  async function updateWeather() {
    try {
      const res = await fetch(W_URL);
      const data = await res.json();
      
      // Current Weather
      document.getElementById('temp-main').innerText = Math.round(data.current.temperature_2m) + "°";
      document.getElementById('w-icon-main').innerText = getIcon(data.current.weather_code);
      
      const codes = {0: "Clear", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast", 45: "Fog", 48: "Fog", 51: "Drizzle", 61: "Rain", 71: "Snow", 95: "Storm"};
      document.getElementById('cond-main').innerText = codes[data.current.weather_code] || "Conditions";

      // 5-Day Forecast
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      let fHtml = '';
      for (let i = 1; i <= 5; i++) {
        const d = new Date(data.daily.time[i] + 'T00:00');
        fHtml += `
          <div class="f-day">
            <span class="f-label">${days[d.getDay()]}</span>
            <span class="f-icon">${getIcon(data.daily.weather_code[i])}</span>
            <div class="f-temp-wrap">
              <span class="f-hi">${Math.round(data.daily.temperature_2m_max[i])}°</span>
              <span class="f-lo">${Math.round(data.daily.temperature_2m_min[i])}°</span>
            </div>
          </div>`;
      }
      document.getElementById('forecast-strip').innerHTML = fHtml;
    } catch(e) { console.error(e); }
  }

  setInterval(updateClock, 1000);
  updateClock();
  updateWeather();
  setInterval(updateWeather, 1800000);
</script>
</body>
</html>
