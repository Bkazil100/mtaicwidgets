<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Broadcast Welcome Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --accent: #F5CA73;
    --fg: #FFFFFF;
    --glass: rgba(255, 255, 255, 0.03);
    --border: rgba(245, 202, 115, 0.2);
  }

  body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80px;
    overflow: hidden;
  }

  #main-container {
    display: flex;
    width: 900px;
    height: 100%;
    align-items: center;
    justify-content: space-between;
    padding: 0 45px;
    box-sizing: border-box;
    background: linear-gradient(90deg, var(--bg) 0%, var(--glass) 50%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
  }

  /* LEFT: Time */
  .clock-section {
    display: flex;
    align-items: baseline;
    gap: 12px;
    min-width: 170px;
  }
  #time { font-size: 52px; font-weight: 800; color: var(--fg); letter-spacing: -2.5px; line-height: 1; }
  #ampm { font-size: 18px; font-weight: 600; color: var(--accent); text-transform: uppercase; }

  /* CENTER: Date & Location */
  .center-section {
    flex-grow: 1;
    padding-left: 35px;
    border-left: 1px solid rgba(255,255,255,0.1);
    margin-left: 35px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  #date { font-size: 19px; font-weight: 600; color: var(--fg); margin-bottom: 3px; }
  .location { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2.5px; }

  /* RIGHT: Weather Capsule */
  .weather-section {
    display: flex;
    align-items: center;
    gap: 22px;
    background: var(--glass);
    padding: 12px 30px;
    border-radius: 50px;
    border: 1px solid rgba(245, 202, 115, 0.15);
  }
  
  #w-icon { font-size: 36px; }
  .temp-main { line-height: 1; text-align: left; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 18px; }
  #temp { font-size: 32px; font-weight: 800; color: var(--fg); }
  #condition { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; display: block; margin-top: 3px; }

  .weather-details { display: flex; flex-direction: column; gap: 3px; min-width: 65px; }
  .w-stat { font-size: 10px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .w-stat span { color: rgba(255,255,255,0.4); font-weight: 500; margin-right: 5px; }
</style>
</head>
<body>

  <div id="main-container">
    <div class="clock-section">
      <span id="time">--:--</span>
      <span id="ampm">--</span>
    </div>

    <div class="center-section">
      <span id="date">--</span>
      <span class="location">MTA Canada • Vaughan Studio</span>
    </div>

    <div class="weather-section">
      <div id="w-icon">☀️</div>
      <div class="temp-main">
        <span id="temp">--°</span>
        <span id="condition">Loading...</span>
      </div>
      <div class="weather-details">
        <div class="w-stat"><span>WIND</span> <span id="w-wind">--</span></div>
        <div class="w-stat"><span>HUM</span> <span id="w-hum">--</span>%</div>
      </div>
    </div>
  </div>

<script>
  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    let m = now.getMinutes();
    let ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    m = m < 10 ? '0' + m : m;
    
    document.getElementById('time').innerText = `${h}:${m}`;
    document.getElementById('ampm').innerText = ampm;

    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);
  }

  const LAT = 43.8361, LON = -79.4982;
  const W_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&timezone=auto`;

  function getIcon(code) {
    if (code === 0) return "☀️";
    if (code <= 3) return "☁️";
    if (code <= 48) return "🌫️";
    if (code <= 67) return "🌧️";
    if (code <= 77) return "❄️";
    return "⛈️";
  }

  function getDesc(code) {
    if (code === 0) return "Clear";
    if (code <= 3) return "Cloudy";
    if (code <= 48) return "Foggy";
    if (code <= 67) return "Rainy";
    if (code <= 77) return "Snowy";
    return "Stormy";
  }

  async function updateWeather() {
    try {
      const res = await fetch(W_URL);
      const data = await res.json();
      document.getElementById('temp').innerText = Math.round(data.current.temperature_2m) + "°";
      document.getElementById('w-icon').innerText = getIcon(data.current.weather_code);
      document.getElementById('condition').innerText = getDesc(data.current.weather_code);
      document.getElementById('w-wind').innerText = Math.round(data.current.wind_speed_10m) + "km/h";
      document.getElementById('w-hum').innerText = data.current.relative_humidity_2m;
    } catch(e) { console.error(e); }
  }

  setInterval(updateClock, 1000);
  updateClock();
  updateWeather();
  setInterval(updateWeather, 1800000);
</script>
</body>
</html>
