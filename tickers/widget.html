<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Ultimate Glass Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --accent: #F5CA73;
    --fg: #FFFFFF;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-glow: rgba(245, 202, 115, 0.1);
  }

  body {
    margin: 0; padding: 15px;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    height: 140px;
    width: 900px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .dashboard-wrapper {
    display: flex;
    width: 100%;
    height: 110px;
    gap: 15px;
    align-items: stretch;
  }

  .panel {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 15px 25px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .panel:hover {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--glass-glow);
    transform: translateY(-2px);
  }

  /* --- CLOCK --- */
  .clock-panel { min-width: 220px; }
  #time { font-size: 52px; font-weight: 900; line-height: 1; letter-spacing: -3px; }
  .clock-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  #ampm { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  #date { font-size: 11px; font-weight: 500; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.5px; }

  /* --- WEATHER --- */
  .weather-panel { flex-grow: 1; min-width: 400px; }
  .weather-main { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; width: 100%; }
  
  /* SVG Icon Styling */
  .w-icon-container { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
  .w-svg { width: 100%; height: 100%; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
  .w-svg.sun { stroke: var(--accent); }

  #temp { font-size: 48px; font-weight: 900; color: var(--fg); line-height: 1; letter-spacing: -2px; }
  
  .forecast-row { display: flex; gap: 20px; margin-left: auto; }
  .f-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .f-day { font-size: 9px; font-weight: 800; opacity: 0.4; text-transform: uppercase; }
  .f-icon-small { width: 18px; height: 18px; stroke: white; stroke-width: 2.5; fill: none; }
  .f-hi { font-size: 11px; font-weight: 700; color: var(--accent); }

  .bottom-row { display: flex; gap: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px; }
  .stat-label { color: rgba(255,255,255,0.3); margin-right: 5px; }

  /* --- LOCATION --- */
  .studio-panel { min-width: 140px; text-align: right; align-items: flex-end; }
  .studio-label { font-size: 9px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
  .studio-name { font-size: 15px; font-weight: 700; opacity: 0.9; line-height: 1.2; }
</style>
</head>
<body>

  <div class="dashboard-wrapper">
    <div class="panel clock-panel">
      <div id="time">--:--</div>
      <div class="clock-meta">
        <span id="ampm">--</span>
        <span id="date">Loading...</span>
      </div>
    </div>

    <div class="panel weather-panel">
      <div class="weather-main">
        <div id="w-icon-main" class="w-icon-container"></div>
        <div id="temp">--°</div>
        <div id="forecast-row" class="forecast-row"></div>
      </div>
      <div class="bottom-row">
         <div><span class="stat-label">HUMIDITY</span> <span id="hum">--%</span></div>
         <div><span class="stat-label">WIND</span> <span id="wind">-- km/h</span></div>
         <div style="margin-left:auto; color:var(--accent)" id="cond">--</div>
      </div>
    </div>

    <div class="panel studio-panel">
      <span class="studio-label">Location</span>
      <span class="studio-name">Vaughan</span>
      <span class="studio-name">Studio • ON</span>
      <div style="margin-top:12px; font-size:9px; font-weight:900; background:rgba(245,202,115,0.1); color:var(--accent); padding:4px 10px; border-radius:4px;">MTA CANADA</div>
    </div>
  </div>

<script>
  // ICON LIBRARY (SVG)
  const ICONS = {
    clear: `<svg class="w-svg sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
    cloud: `<svg class="w-svg" viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>`,
    rain: `<svg class="w-svg" viewBox="0 0 24 24"><path d="M16 13a4 4 0 0 1-8 0"/><path d="M20 16.58A5 5 0 0 0 18 10h-1.26A8 8 0 1 0 9 20"/><line x1="8" y1="13" x2="8" y2="13.01"/><line x1="12" y1="13" x2="12" y2="13.01"/><line x1="16" y1="13" x2="16" y2="13.01"/></svg>`,
    snow: `<svg class="w-svg" viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="19.07" y2="4.93"/></svg>`,
    fog: `<svg class="w-svg" viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"/><line x1="6" y1="13" x2="18" y2="13"/><line x1="4" y1="17" x2="20" y2="17"/></svg>`,
    storm: `<svg class="w-svg" viewBox="0 0 24 24"><path d="M19 16.9A5 5 0 0 0 18 10h-1.26a8 8 0 1 0-11.62 9"/><polyline points="13 11 9 17 15 17 11 23"/></svg>`
  };

  function getIcon(code) {
    if (code === 0) return ICONS.clear;
    if (code <= 3) return ICONS.cloud;
    if (code >= 45 && code <= 48) return ICONS.fog;
    if (code <= 67) return ICONS.rain;
    if (code <= 77) return ICONS.snow;
    return ICONS.storm;
  }

  function updateClock() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    let ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12; m = m < 10 ? '0' + m : m;
    document.getElementById('time').innerText = `${h}:${m}`;
    document.getElementById('ampm').innerText = ampm;
    document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  const LAT = 43.8361, LON = -79.4982;
  const W_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max&timezone=auto&forecast_days=6`;

  async function updateWeather() {
    try {
      const res = await fetch(W_URL);
      const data = await res.json();
      document.getElementById('temp').innerText = Math.round(data.current.temperature_2m) + "°";
      document.getElementById('w-icon-main').innerHTML = getIcon(data.current.weather_code);
      document.getElementById('hum').innerText = data.current.relative_humidity_2m + "%";
      document.getElementById('wind').innerText = Math.round(data.current.wind_speed_10m);
      
      const codes = {0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast", 45: "Foggy", 48: "Dense Fog"};
      document.getElementById('cond').innerText = codes[data.current.weather_code] || "Unsettled";

      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      let fHtml = '';
      for (let i = 1; i <= 5; i++) {
        const d = new Date(data.daily.time[i] + 'T00:00');
        const iconRaw = getIcon(data.daily.weather_code[i]).replace('w-svg', 'f-icon-small');
        fHtml += `<div class="f-item"><span class="f-day">${days[d.getDay()]}</span>${iconRaw}<span class="f-hi">${Math.round(data.daily.temperature_2m_max[i])}°</span></div>`;
      }
      document.getElementById('forecast-row').innerHTML = fHtml;
    } catch(e) { console.error(e); }
  }

  setInterval(updateClock, 1000);
  updateClock(); updateWeather();
  setInterval(updateWeather, 1800000);
</script>
</body>
</html>
