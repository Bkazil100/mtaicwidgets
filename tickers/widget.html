<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Left-Aligned Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --accent: #F5CA73;
    --fg: #FFFFFF;
    --glass: rgba(255, 255, 255, 0.03);
    --border: rgba(245, 202, 115, 0.2);
  }

  body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    display: flex;
    justify-content: flex-start; /* Aligns the container to the left */
    align-items: center;
    height: 80px;
    overflow: hidden;
  }

  #main-container {
    display: flex;
    width: 900px;
    height: 100%;
    align-items: center;
    justify-content: flex-start; /* Aligns content inside to the left */
    padding-left: 40px; /* Matches the margin of your other SharePoint parts */
    box-sizing: border-box;
    background: linear-gradient(90deg, var(--bg) 0%, var(--glass) 50%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
  }

  /* --- SECTION 1: CLOCK --- */
  .clock-section {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-right: 40px; /* Fixed gap to keep next section left-aligned */
  }
  #time { font-size: 44px; font-weight: 800; color: var(--fg); letter-spacing: -2px; }
  #ampm { font-size: 16px; font-weight: 600; color: var(--accent); text-transform: uppercase; }

  /* --- SECTION 2: DATE --- */
  .date-section {
    border-left: 1px solid rgba(255,255,255,0.1);
    padding-left: 25px;
    margin-right: 50px;
    min-width: 170px;
  }
  #date { font-size: 16px; font-weight: 700; color: var(--fg); display: block; margin-bottom: 2px; }
  .location { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }

  /* --- SECTION 3: 5-DAY FORECAST --- */
  .forecast-strip {
    display: flex;
    gap: 25px;
    padding: 0 30px;
    border-left: 1px solid rgba(255,255,255,0.1);
    border-right: 1px solid rgba(255,255,255,0.1);
    margin-right: 40px;
  }
  .f-day { display: flex; flex-direction: column; align-items: center; }
  .f-label { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 3px; }
  .f-icon { font-size: 18px; margin-bottom: 2px; }
  .f-temp { font-size: 12px; font-weight: 700; color: var(--fg); }
  .f-low { color: rgba(255,255,255,0.3); font-weight: 400; font-size: 10px; margin-left: 2px; }

  /* --- SECTION 4: CURRENT --- */
  .current-section {
    display: flex;
    align-items: center;
    gap: 15px;
  }
  #w-icon { font-size: 34px; }
  .temp-main { text-align: left; line-height: 1; }
  #temp { font-size: 30px; font-weight: 800; color: var(--fg); }
  #condition { font-size: 9px; font-weight: 700; color: var(--accent); text-transform: uppercase; display: block; margin-top: 3px; }
</style>
</head>
<body>

  <div id="main-container">
    <div class="clock-section">
      <span id="time">--:--</span>
      <span id="ampm">--</span>
    </div>

    <div class="date-section">
      <span id="date">--</span>
      <span class="location">Vaughan Studio</span>
    </div>

    <div id="forecast-strip" class="forecast-strip">
      </div>

    <div class="current-section">
      <div id="w-icon">☀️</div>
      <div class="temp-main">
        <span id="temp">--°</span>
        <span id="condition">--</span>
      </div>
    </div>
  </div>

<script>
  function updateClock() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    let ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    m = m < 10 ? '0' + m : m;
    document.getElementById('time').innerText = `${h}:${m}`;
    document.getElementById('ampm').innerText = ampm;
    const options = { weekday: 'long', month: 'short', day: 'numeric' };
    document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);
  }

  const LAT = 43.8361, LON = -79.4982;
  const W_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=6`;

  function getIcon(code) {
    if (code === 0) return "☀️";
    if (code <= 3) return "☁️";
    if (code <= 48) return "🌫️";
    if (code <= 67) return "🌧️";
    if (code <= 77) return "❄️";
    return "⛈️";
  }

  function getDesc(code) {
    if (code === 0) return "Clear";
    if (code <= 3) return "Cloudy";
    if (code <= 48) return "Foggy";
    if (code <= 67) return "Rainy";
    if (code <= 77) return "Snowy";
    return "Stormy";
  }

  async function updateWeather() {
    try {
      const res = await fetch(W_URL);
      const data = await res.json();
      document.getElementById('temp').innerText = Math.round(data.current.temperature_2m) + "°";
      document.getElementById('w-icon').innerText = getIcon(data.current.weather_code);
      document.getElementById('condition').innerText = getDesc(data.current.weather_code);

      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      let fHtml = '';
      for (let i = 1; i <= 5; i++) {
        const d = new Date(data.daily.time[i] + 'T00:00');
        fHtml += `
          <div class="f-day">
            <span class="f-label">${days[d.getDay()]}</span>
            <span class="f-icon">${getIcon(data.daily.weather_code[i])}</span>
            <span class="f-temp">${Math.round(data.daily.temperature_2m_max[i])}°<span class="f-low">${Math.round(data.daily.temperature_2m_min[i])}°</span></span>
          </div>`;
      }
      document.getElementById('forecast-strip').innerHTML = fHtml;
    } catch(e) { console.error(e); }
  }

  setInterval(updateClock, 1000);
  updateClock();
  updateWeather();
  setInterval(updateWeather, 1800000);
</script>
</body>
</html>
