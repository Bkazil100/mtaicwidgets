<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA World News Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bar-bg: #080F17;   
    --fg: #FFFFFF;       
    --accent: #F5CA73;   
    --height: 50px;      
    --speed: 160s;       
  }

  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bar-bg);
  }

  #wrap {
    background: var(--bar-bg);
    width: 100%;
    height: var(--height);
    display: flex;
    align-items: center;
    justify-content: center; 
    position: relative;
    transition: mask-image 0.5s ease;
  }

  #wrap.faded {
    -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
  }

  #ticker {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
    width: 100%;
    justify-content: center; 
  }

  #ticker.running {
    justify-content: flex-start;
    animation: scroll var(--speed) linear infinite;
  }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .welcome-msg {
    color: var(--accent);
    font-size: 15px; 
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .news-item {
    display: flex;
    align-items: center;
    padding-right: 3rem;
  }

  .meta {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(245, 202, 115, 0.1);
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 12px;
    border: 1px solid rgba(245, 202, 115, 0.2);
  }

  .headline {
    font-size: 14px;
    font-weight: 500;
    color: var(--fg);
  }

  .separator {
    color: rgba(245, 202, 115, 0.3);
    margin-left: 3.5rem;
  }
</style>
</head>
<body>

  <div id="wrap">
    <div id="ticker
