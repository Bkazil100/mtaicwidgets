<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>World News Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bar-bg: #080F17;   
    --fg: #FFFFFF;       
    --accent: #F5CA73;   
    --height: 50px;      
    --speed: 180s;       
  }

  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bar-bg);
  }

  #wrap {
    background: var(--bar-bg);
    width: 100%;
    height: var(--height);
    display: flex;
    align-items: center;
    position: relative;
    /* This creates the modern "Fade" at the edges */
    -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
  }

  #ticker {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
    visibility: hidden; /* Hidden until feed loads */
  }

  #ticker.running {
    visibility: visible;
    animation: scroll var(--speed) linear infinite;
  }

  #wrap:hover #ticker { animation-play-state: paused; }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .news-item {
    display: flex;
    align-items: center;
    padding-right: 3rem;
  }

  .meta {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--accent);
    background: rgba(245, 202, 115, 0.1);
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 12px;
  }

  .headline {
    font-size: 14px;
    font-weight: 500;
    color: var(--fg);
  }

  .separator {
    color: rgba(245, 202, 115, 0.3);
    margin-left: 3rem;
    font-size: 12px;
  }
</style>
</head>
<body>

  <div id="wrap">
    <div id="ticker"></div>
  </div>

<script>
const FEED = 'https://news.google.com/rss?topic=n&hl=en-CA&gl=CA&ceid=CA:en';
const PROXY = 'https://api.allorigins.win/raw?url=';
const TICK = document.getElementById('ticker');

const txt = (el, sel) => el.querySelector(sel)?.textContent?.trim() || '';

function build(xml) {
  const nodes = [...xml.querySelectorAll('item, entry')].slice(0, 20);
  if (!nodes.length) return '';

  const content = nodes.map((it) => {
    let title = txt(it, 'title');
    let source = txt(it, 'source') || (title.includes(' - ') ? title.split(' - ').pop().trim() : 'News');
    if (title.includes(' - ')) title = title.split(' - ').slice(0, -1).join(' - ');

    return `
      <div class="news-item">
        <span class="meta">${source}</span>
        <span class="headline">${title}</span>
        <span class="separator">•</span>
      </div>`;
  }).join('');

  return content + content;
}

async function fetchFeed() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(FEED));
    if (!res.ok) throw new Error();
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, 'application/xml');
    const html = build(xml);
    
    if (html) {
      TICK.innerHTML = html;
      TICK.classList.add('running');
    }
  } catch (e) {
    TICK.innerHTML = '...'; // Silently fail, leave bar empty
  }
}

fetchFeed();
</script>
</body>
</html>
