<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA World News Ticker - Robust</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bar-bg: #080F17; --fg: #FFFFFF; --accent: #F5CA73; --height: 50px;
  }
  html, body { margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bar-bg); }
  #wrap { width: 100%; height: var(--height); position: relative; background: var(--bar-bg); display: flex; align-items: center; }
  
  .layer { position: absolute; width: 100%; display: flex; align-items: center; transition: opacity 0.6s ease; }
  #welcome-layer { justify-content: center; z-index: 10; }
  #ticker-layer { 
    z-index: 5; 
    overflow: hidden; 
    -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
  }

  .ticker-track { display: flex; white-space: nowrap; will-change: transform; }
  .ticker-content { display: flex; flex-shrink: 0; }
  
  .news-item { display: flex; align-items: center; padding-right: 4rem; }
  .meta { font-size: 10px; font-weight: 800; color: var(--bar-bg); background: var(--accent); padding: 3px 8px; border-radius: 3px; margin-right: 12px; }
  .headline { font-size: 14px; font-weight: 500; color: var(--fg); }
  .separator { color: rgba(245, 202, 115, 0.2); margin-left: 4rem; font-size: 18px; }

  .welcome-msg { color: var(--accent); font-size: 14px; font-weight: 600; }
  .hidden { opacity: 0; pointer-events: none; }
  .visible { opacity: 1; }
  .dimmed { opacity: 0.3; filter: grayscale(1); }
</style>
</head>
<body>
  <div id="wrap">
    <div id="welcome-layer" class="layer visible">
      <span id="welcome-text" class="welcome-msg">Welcome to MTA International Canada in Toronto</span>
    </div>
    <div id="ticker-layer" class="layer hidden">
      <div id="ticker-track" class="ticker-track"></div>
    </div>
  </div>

<script>
const FEEDS = [
  { name: 'REUTERS', url: 'https://news.google.com/rss/search?q=site%3Areuters.com&hl=en-US&gl=US&ceid=US%3Aen' },
  { name: 'BBC WORLD', url: 'http://feeds.bbci.co.uk/news/world/rss.xml' }
];
const API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=';
const TRACK = document.getElementById('ticker-track');
const W_LAYER = document.getElementById('welcome-layer');
const T_LAYER = document.getElementById('ticker-layer');
const W_TEXT = document.getElementById('welcome-text');

let posX = 0;
let speed = 1.2; // Adjust pixels per frame (1.2 is smooth and readable)
let animationId;

function startMarquee() {
  const contentWidth = TRACK.firstElementChild.offsetWidth;
  function animate() {
    posX -= speed;
    // Seamless reset: Once the first block is fully off-screen
    if (Math.abs(posX) >= contentWidth) {
      posX = 0;
    }
    TRACK.style.transform = `translate3d(${posX}px, 0, 0)`;
    animationId = requestAnimationFrame(animate);
  }
  animate();
}

async function fetchFeed() {
  cancelAnimationFrame(animationId);
  T_LAYER.classList.replace('visible', 'hidden');
  W_LAYER.classList.replace('hidden', 'visible');
  
  const results = await Promise.all(FEEDS.map(async f => {
    try {
      const r = await fetch(API_URL + encodeURIComponent(f.url));
      const d = await r.json();
      return d.items.slice(0, 10).map(it => `
        <div class="news-item">
          <span class="meta">${f.name}</span>
          <span class="headline">${it.title.replace(/\s-\s.*$/i, '').split(' | ')[0]}</span>
          <span class="separator">•</span>
        </div>`).join('');
    } catch(e) { return ''; }
  }));

  const html = results.join('');
  if (html) {
    // Inject two identical blocks for the loop
    TRACK.innerHTML = `<div class="ticker-content">${html}</div><div class="ticker-content">${html}</div>`;
    posX = 0;
    // Small delay to ensure browser has rendered the new width
    setTimeout(() => {
      W_LAYER.classList.replace('visible', 'hidden');
      T_LAYER.classList.replace('hidden', 'visible');
      startMarquee();
    }, 500);
  } else {
    W_TEXT.classList.add('dimmed');
  }
}

setTimeout(fetchFeed, 4000);
setInterval(fetchFeed, 1800000);
</script>
</body>
</html>
