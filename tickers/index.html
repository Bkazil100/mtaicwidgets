<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA World News Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bar-bg: #080F17;   
    --fg: #FFFFFF;       
    --accent: #F5CA73;   
    --height: 50px;      
    --speed: 160s;       
  }

  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bar-bg);
  }

  #wrap {
    background: var(--bar-bg);
    width: 100%;
    height: var(--height);
    display: flex;
    align-items: center;
    justify-content: center; 
    position: relative;
  }

  #wrap.faded {
    -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
    mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
  }

  #ticker {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
    width: 100%;
    justify-content: center; 
  }

  #ticker.running {
    justify-content: flex-start;
    animation: scroll var(--speed) linear infinite;
  }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .welcome-msg {
    color: var(--accent);
    font-size: 14px; 
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: opacity 0.5s ease;
  }

  .welcome-msg.dimmed {
    opacity: 0.35;
    filter: grayscale(1);
  }

  .news-item {
    display: flex;
    align-items: center;
    padding-right: 3.5rem;
  }

  /* Improved Source Tag Design */
  .meta {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--bar-bg);
    background: var(--accent); 
    padding: 3px 8px;
    border-radius: 3px;
    margin-right: 12px;
    text-transform: uppercase;
  }

  .headline {
    font-size: 14px;
    font-weight: 500;
    color: var(--fg);
  }

  .separator {
    color: rgba(245, 202, 115, 0.2);
    margin-left: 3.5rem;
    font-size: 18px;
  }
</style>
</head>
<body>

  <div id="wrap">
    <div id="ticker">
      <span class="welcome-msg">Welcome to MTA International Canada in Toronto</span>
    </div>
  </div>

<script>
// Multiple sources to combine
const FEEDS = [
  { name: 'REUTERS', url: 'https://news.google.com/rss/search?q=site%3Areuters.com&hl=en-US&gl=US&ceid=US%3Aen' },
  { name: 'BBC WORLD', url: 'http://feeds.bbci.co.uk/news/world/rss.xml' }
];

const PROXY = 'https://api.allorigins.win/raw?url=';
const TICK = document.getElementById('ticker');
const WRAP = document.getElementById('wrap');

const txt = (el, sel) => el.querySelector(sel)?.textContent?.trim() || '';

function build(xml, sourceName) {
  // Grab top 10 from each source so the ticker isn't overwhelmingly long
  const nodes = [...xml.querySelectorAll('item')].slice(0, 10);
  if (!nodes.length) return '';

  return nodes.map((it) => {
    let title = txt(it, 'title');
    title = title.replace(/\s-\s.*$/i, '').split(' | ')[0];
    
    return `
      <div class="news-item">
        <span class="meta">${sourceName}</span>
        <span class="headline">${title}</span>
        <span class="separator">•</span>
      </div>`;
  }).join('');
}

async function fetchFeed() {
  // Create an array of fetch promises for both feeds
  const fetchPromises = FEEDS.map(async (feed) => {
    try {
      const res = await fetch(PROXY + encodeURIComponent(feed.url + '&t=' + Date.now()));
      if (!res.ok) throw new Error('Proxy error');
      
      const text = await res.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      
      if (xml.querySelector('parsererror') || !xml.querySelector('item')) {
        throw new Error('Invalid XML');
      }

      return build(xml, feed.name); // Return the HTML chunk for this feed
    } catch (e) {
      console.warn(`Source ${feed.name} failed:`, e);
      return ''; // Return empty string if this specific feed fails
    }
  });

  // Wait for both feeds to finish (whether they succeed or fail)
  const results = await Promise.all(fetchPromises);
  
  // Combine the HTML from all successful feeds
  const combinedHtml = results.join('');

  if (combinedHtml) {
    // Duplicate the combined HTML once for the seamless infinite scroll
    TICK.innerHTML = combinedHtml + combinedHtml;
    TICK.classList.add('running');
    WRAP.classList.add('faded'); 
  } else {
    // If combinedHtml is empty, it means ALL feeds failed
    showError();
  }
}

function showError() {
  TICK.innerHTML = '<span class="welcome-msg dimmed">Welcome to MTA International Canada in Toronto</span>';
  TICK.classList.remove('running');
  WRAP.classList.remove('faded');
  TICK.style.justifyContent = 'center';
}

// Sequence: 4s delay on load, then 30 min refresh
setTimeout(fetchFeed, 4000);
setInterval(fetchFeed, 1800000);
</script>
</body>
</html>
