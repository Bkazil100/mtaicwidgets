<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>World News Ticker – Google News (CA)</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bar-bg:#173467;   /* Background color of ticker bar */
    --fg:#ffffff;       /* Foreground (headline text) color */
    --accent:#d9a33c;   /* Accent color (brand + meta) */
    --height:50px;      /* Ticker bar height */
    --speed:250s;       /* Scroll animation speed */
    --gap:2rem;         /* Horizontal gap between items */
  }

  html,body{
    margin:0;
    height:100%;        /* fill iframe container */
    width:100%;
    overflow:hidden;
    font-family:'Lato',system-ui,sans-serif;
    background:transparent; /* transparent for embedding */
  }

  #wrap{
    background:var(--bar-bg);
    width:100%;
    height:var(--height);   /* ticker bar height */
    overflow:hidden;
    pointer-events:none;
    display:flex;
    align-items:center;

    /* vertical breathing room */
    padding-top:8px;
    padding-bottom:8px;
    box-sizing:border-box;
  }

  /* ticker strip (scrolling container) */
  #ticker{
    display:inline-flex;
    align-items:center;
    white-space:nowrap;
    padding-left:12px; /* left padding */
  }
  #ticker.running{
    animation:scroll var(--speed) linear infinite;
  }
  @keyframes scroll{
    0%   {transform:translateX(0);}
    100% {transform:translateX(-50%);}
  }

  /* common element structure */
  .divider,.meta,.headline,.brand{
    display:inline-flex;
    align-items:center;
  }

  /* divider between items */
  .divider{
    border-left:1px solid var(--fg);
    margin:0 var(--gap); /* adjustable gap between items */
    height:60%;
  }

  /* source + time ago */
  .meta{
    font-size:calc(var(--height) * 0.20); /* scales with bar height */
    font-weight:400;
    color:var(--accent);
    margin-left:.5rem;
  }

  /* HEADLINE + BRAND text */
  .headline,.brand{
    font-size:calc(var(--height) * 0.45); /* ~36px at 80px bar */
    line-height:1.2;
    font-weight:600;
    letter-spacing:.5px;
    margin-right:1rem; /* extra spacing after each headline */
  }

  .headline{
    color:var(--fg);
    margin-left:.5rem;
  }

  .brand{
    color:var(--accent);
  }

  /* Responsive: phones ≤ 500 px */
  @media (max-width:500px){
    :root{
      --height:40px;  /* shorter bar */
      --gap:1rem;     /* smaller gap */
    }
    .meta{font-size:calc(var(--height) * 0.25);}       
    .headline,.brand{font-size:calc(var(--height) * 0.45);} 
  }
</style>
</head>

<body>
  <div id="wrap" role="log" aria-live="polite">
    <div id="ticker">
      <!-- Initial placeholder before feed loads -->
      <span class="brand">MTA&nbsp;&nbsp;INTERNATIONAL&nbsp;CANADA</span>
    </div>
  </div>

<script>
/* RSS feed URL (Google News: Top stories, Canada, English) */
const FEED ='https://news.google.com/rss?topic=n&hl=en-CA&gl=CA&ceid=CA:en';

/* Proxy to bypass CORS (AllOrigins) */
const PROXY = 'https://api.allorigins.win/raw?url='; // returns raw body

/* Reference to ticker container */
const TICK = document.getElementById('ticker');

/* Helper: time ago string */
const ago = d => {
  const m = Math.floor((Date.now() - d.getTime()) / 60000);
  return m < 60 ? m + 'm' : m < 1440 ? Math.floor(m / 60) + 'h' : Math.floor(m / 1440) + 'd';
};

/* Extract text content helper */
const txt = (el, sel) => el.querySelector(sel)?.textContent?.trim() || '';

/* Try to derive a readable source */
function getSource(it, title) {
  // RSS 2.0: <source>Some Outlet</source>
  let s = txt(it, 'source');
  if (s) return s;

  // Atom: <author><name>Outlet</name></author>
  s = txt(it, 'author > name');
  if (s) return s;

  // Google News often sticks "Title - Outlet" in <title>
  if (title.includes(' - ')) {
    const parts = title.split(' - ');
    if (parts.length > 1) return parts.pop().trim();
  }

  // Fallback to domain from link
  const link = txt(it, 'link') || it.querySelector('link')?.getAttribute('href') || '';
  try {
    if (link) return new URL(link).hostname.replace(/^www\./,'');
  } catch {}
  return 'news.google';
}

/* Get published date across RSS/Atom */
function getDate(it) {
  const d = txt(it, 'pubDate') || txt(it, 'published') || txt(it, 'updated');
  return d ? new Date(d) : new Date();
}

/* Build ticker HTML from RSS/Atom items */
function build(xml) {
  // Support RSS <item> and Atom <entry>
  const nodes = [...xml.querySelectorAll('item, entry')].slice(0, 25);
  if (!nodes.length) return '<span class="brand">(no items)</span>';

  return nodes.map((it, i) => {
    let rawTitle = txt(it, 'title');
    if (!rawTitle) return '';

    // If Google News used "Title - Source", split it so we can style source separately
    const source = getSource(it, rawTitle);
    if (source !== 'news.google' && rawTitle.includes(' - ')) {
      const parts = rawTitle.split(' - ');
      if (parts.length > 1) rawTitle = parts.slice(0, -1).join(' - ');
    }

    const dt = getDate(it);

    return `${i ? '<span class="divider"></span>' : ''}`
      + `<span class="meta">${source} · ${ago(dt)}</span>`
      + `<span class="headline">${rawTitle}</span>`;
  }).join('');
}

/* Fetch + render feed (with graceful fallback to /get variant) */
async function fetchFeed() {
  try {
    // Try RAW first
    let res = await fetch(PROXY + encodeURIComponent(FEED));
    let text = await res.text();

    // If RAW returned JSON wrapper (some proxies do), unwrap "contents"
    if (text.trim().startsWith('{')) {
      try {
        const obj = JSON.parse(text);
        if (obj && obj.contents) text = obj.contents;
      } catch {}
    }

    const xml = new DOMParser().parseFromString(text, 'application/xml');

    // If parser error, try AllOrigins /get (JSON wrapper)
    if (xml.querySelector('parsererror')) {
      const res2 = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(FEED));
      const j = await res2.json();
      const xml2 = new DOMParser().parseFromString(j.contents, 'application/xml');
      render(xml2);
      return;
    }

    render(xml);
  } catch (e) {
    console.error(e);
    TICK.innerHTML = '<span class="brand">Feed error – retrying…</span>';
    TICK.classList.remove('running');
    setTimeout(fetchFeed, 300000); // retry in 5 min
  }
}

/* Render and start animation only if we have items */
function render(xml) {
  const html = build(xml);
  const hasItems = !html.includes('(no items)');
  TICK.innerHTML = hasItems ? html + html : html; // duplicate only when we have items
  TICK.classList.toggle('running', hasItems);
}

/* Start */
fetchFeed();
</script>
</body>
</html>
