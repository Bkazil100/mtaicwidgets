<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA World News Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bar-bg: #080F17;   
    --fg: #FFFFFF;       
    --accent: #F5CA73;   
    --height: 50px;      
    --speed: 160s;       
  }

  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bar-bg);
  }

  #wrap {
    background: var(--bar-bg);
    width: 100%;
    height: var(--height);
    display: flex;
    align-items: center;
    justify-content: center; 
    position: relative;
    transition: mask-image 0.5s ease;
  }

  #wrap.faded {
    -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
    mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
  }

  #ticker {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
    width: 100%;
    justify-content: center; 
  }

  #ticker.running {
    justify-content: flex-start;
    animation: scroll var(--speed) linear infinite;
  }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .welcome-msg {
    color: var(--accent);
    font-size: 14px; 
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: opacity 0.5s ease;
  }

  /* The Dimmed State */
  .welcome-msg.dimmed {
    opacity: 0.4;
    filter: grayscale(1);
  }

  .news-item {
    display: flex;
    align-items: center;
    padding-right: 3.5rem;
  }

  /* Improved Source Design */
  .meta {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--bar-bg);
    background: var(--accent); /* Solid gold tag for better visibility */
    padding: 3px 7px;
    border-radius: 3px;
    margin-right: 12px;
    box-shadow: 0 0 10px rgba(245, 202, 115, 0.2);
  }

  .headline {
    font-size: 14px;
    font-weight: 500;
    color: var(--fg);
  }

  .separator {
    color: rgba(245, 202, 115, 0.2);
    margin-left: 3.5rem;
    font-size: 20px;
  }
</style>
</head>
<body>

  <div id="wrap">
    <div id="ticker">
      <span id="status-msg" class="welcome-msg">Welcome to MTA International Canada in Toronto</span>
    </div>
  </div>

<script>
const FEED = 'https://news.google.com/rss/search?q=site%3Areuters.com&hl=en-US&gl=US&ceid=US%3Aen';
const PROXY = 'https://api.allorigins.win/raw?url=';
const TICK = document.getElementById('ticker');
const WRAP = document.getElementById('wrap');

const txt = (el, sel) => el.querySelector(sel)?.textContent?.trim() || '';

function build(xml) {
  const nodes = [...xml.querySelectorAll('item')].slice(0, 20);
  if (!nodes.length) return '';

  const content = nodes.map((it) => {
    let title = txt(it, 'title');
    title = title.replace(/\s-\sReuters$/i, '').split(' | ')[0];
    
    return `
      <div class="news-item">
        <span class="meta">REUTERS</span>
        <span class="headline">${title}</span>
        <span class="separator">•</span>
      </div>`;
  }).join('');

  return content + content; 
}

async function fetchFeed() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(FEED + '&t=' + Date.now()));
    if (!res.ok) throw new Error('Proxy error');
    
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, 'text/xml');
    
    if (xml.querySelector('parsererror') || !xml.querySelector('item')) {
      throw new Error('Invalid XML');
    }

    const html = build(xml);
    
    if (html) {
      TICK.innerHTML = html;
      TICK.classList.add('running');
      WRAP.classList.add('faded'); 
    } else {
      showError();
    }
  } catch (e) {
    console.error("Feed Error:", e);
    showError();
  }
}

function showError() {
  // Sets the message and adds the .dimmed class
  TICK.innerHTML = '<span class="welcome-msg dimmed">Welcome to MTA International Canada in Toronto</span>';
  TICK.classList.remove('running');
  WRAP.classList.remove('faded');
  TICK.style.justifyContent = 'center';
}

// Start sequence
setTimeout(fetchFeed, 4000);
setInterval(fetchFeed, 1800000); // 30 min refresh
</script>
</body>
</html>
