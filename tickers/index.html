<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA World News Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bar-bg: #080F17;   /* Your requested background */
    --fg: #FFFFFF;       /* White text */
    --accent: #F5CA73;   /* Your requested accent */
    --height: 50px;      
    --speed: 160s;       /* Smooth scrolling speed */
  }

  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bar-bg);
  }

  #wrap {
    background: var(--bar-bg);
    width: 100%;
    height: var(--height);
    display: flex;
    align-items: center;
    position: relative;
    /* Soft fade-out effect on the left and right edges */
    -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
  }

  #ticker {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
    padding-left: 20px;
  }

  /* Animation class applied after feed loads */
  #ticker.running {
    padding-left: 0;
    animation: scroll var(--speed) linear infinite;
  }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  #wrap:hover #ticker {
    animation-play-state: paused;
  }

  /* Placeholder Styling */
  .placeholder {
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .news-item {
    display: flex;
    align-items: center;
    padding-right: 3rem;
  }

  .meta {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--accent);
    background: rgba(245, 202, 115, 0.1);
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 12px;
    border: 1px solid rgba(245, 202, 115, 0.2);
  }

  .headline {
    font-size: 14px;
    font-weight: 500;
    color: var(--fg);
  }

  .separator {
    color: rgba(245, 202, 115, 0.3);
    margin-left: 3.5rem;
    font-size: 14px;
  }

  .error-dash {
    color: var(--accent);
    width: 100vw;
    text-align: center;
    font-weight: bold;
  }
</style>
</head>
<body>

  <div id="wrap">
    <div id="ticker">
      <span class="placeholder">Welcome to MTA International Canada in Toronto</span>
    </div>
  </div>

<script>
/* CONFIGURATION */
const FEED = 'https://www.reuters.com/arc/outboundfeeds/news-handler/?outputType=xml';
const PROXY = 'https://api.allorigins.win/raw?url=';
const TICK = document.getElementById('ticker');

const txt = (el, sel) => el.querySelector(sel)?.textContent?.trim() || '';

/* BUILD TICKER CONTENT */
function build(xml) {
  const nodes = [...xml.querySelectorAll('item, entry')].slice(0, 20);
  if (!nodes.length) return '';

  const content = nodes.map((it) => {
    let title = txt(it, 'title');
    
    // Reuters headlines are clean, but we will ensure any extra source info is removed
    if (title.includes(' | ')) title = title.split(' | ')[0];

    return `
      <div class="news-item">
        <span class="meta">REUTERS</span>
        <span class="headline">${title}</span>
        <span class="separator">•</span>
      </div>`;
  }).join('');

  // Double the content for a seamless infinite loop
  return content + content; 
}

/* FETCH DATA */
async function fetchFeed() {
  // Short delay so users see the Welcome message
  await new Promise(r => setTimeout(r, 2000));

  try {
    const res = await fetch(PROXY + encodeURIComponent(FEED));
    if (!res.ok) throw new Error("Fetch failed");
    
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, 'application/xml');
    const html = build(xml);
    
    if (html) {
      TICK.innerHTML = html;
      TICK.classList.add('running');
    } else {
      showError();
    }
  } catch (e) {
    console.error("Ticker Error:", e);
    showError();
  }
}

function showError() {
  TICK.innerHTML = '<span class="error-dash">-</span>';
  TICK.classList.remove('running');
}

/* START */
fetchFeed();
</script>
</body>
</html>
