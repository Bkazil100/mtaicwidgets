<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA World News Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bar-bg: #080F17;   
    --fg: #FFFFFF;       
    --accent: #F5CA73;   
    --height: 50px;      
    --speed: 160s; /* Increase to slow down, decrease to speed up */
  }

  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bar-bg);
  }

  #wrap {
    background: var(--bar-bg);
    width: 100%;
    height: var(--height);
    position: relative;
  }

  /* --- NEW: Layer System for Fading --- */
  .layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    transition: opacity 0.8s ease, filter 0.8s ease;
  }

  #welcome-layer {
    justify-content: center;
    z-index: 1;
  }

  #ticker-layer {
    justify-content: flex-start;
    z-index: 2;
    -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
  }

  /* Visibility Classes controlled by JavaScript */
  .hidden { opacity: 0; pointer-events: none; }
  .visible { opacity: 1; pointer-events: auto; }
  .dimmed { opacity: 0.4; filter: grayscale(1); }

  /* --- UPGRADED: Bulletproof Ticker Track --- */
  #ticker-track {
    display: flex;
    width: max-content;
    will-change: transform;
    animation: scroll var(--speed) linear infinite;
  }

  /* Wraps the 10 headlines so the browser calculates exact 50% width */
  .ticker-content {
    display: flex;
    flex-shrink: 0;
  }

  @keyframes scroll {
    0%   { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-50%, 0, 0); }
  }

  /* --- Typography & Styling --- */
  .welcome-msg {
    color: var(--accent);
    font-size: 14px; 
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .news-item {
    display: flex;
    align-items: center;
    padding-right: 3.5rem;
    flex-shrink: 0; /* Prevents text from squishing */
  }

  .meta {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--bar-bg);
    background: var(--accent); 
    padding: 3px 8px;
    border-radius: 3px;
    margin-right: 12px;
    text-transform: uppercase;
  }

  .headline {
    font-size: 14px;
    font-weight: 500;
    color: var(--fg);
  }

  .separator {
    color: rgba(245, 202, 115, 0.2);
    margin-left: 3.5rem;
    font-size: 18px;
  }
</style>
</head>
<body>

  <div id="wrap">
    <div id="welcome-layer" class="layer visible">
      <span id="welcome-text" class="welcome-msg">Welcome to MTA International Canada in Toronto</span>
    </div>

    <div id="ticker-layer" class="layer hidden">
      <div id="ticker-track">
        </div>
    </div>
  </div>

<script>
const FEEDS = [
  { name: 'REUTERS', url: 'https://news.google.com/rss/search?q=site%3Areuters.com&hl=en-US&gl=US&ceid=US%3Aen' },
  { name: 'BBC WORLD', url: 'http://feeds.bbci.co.uk/news/world/rss.xml' }
];

const API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=';

// DOM Elements
const WELCOME_LAYER = document.getElementById('welcome-layer');
const TICKER_LAYER = document.getElementById('ticker-layer');
const TICKER_TRACK = document.getElementById('ticker-track');
const WELCOME_TEXT = document.getElementById('welcome-text');

function build(items, sourceName) {
  const nodes = items.slice(0, 10);
  if (!nodes.length) return '';

  return nodes.map((it) => {
    let title = it.title || '';
    title = title.replace(/\s-\s.*$/i, '').split(' | ')[0];
    
    return `
      <div class="news-item">
        <span class="meta">${sourceName}</span>
        <span class="headline">${title}</span>
        <span class="separator">•</span>
      </div>`;
  }).join('');
}

async function fetchFeed() {
  // 1. Fade OUT ticker, Fade IN Welcome message (for refreshing state)
  TICKER_LAYER.classList.replace('visible', 'hidden');
  WELCOME_LAYER.classList.replace('hidden', 'visible');
  WELCOME_TEXT.classList.remove('dimmed'); 
  
  // Wait 800ms for the fade out to finish before doing heavy network loading
  await new Promise(r => setTimeout(r, 800));

  const fetchPromises = FEEDS.map(async (feed) => {
    try {
      const res = await fetch(API_URL + encodeURIComponent(feed.url));
      if (!res.ok) throw new Error('API network error');
      
      const data = await res.json();
      if (data.status !== 'ok') throw new Error('API failed to parse feed');

      return build(data.items, feed.name); 
    } catch (e) {
      console.warn(`Source ${feed.name} failed:`, e);
      return ''; 
    }
  });

  const results = await Promise.all(fetchPromises);
  const combinedHtml = results.join('');

  if (combinedHtml) {
    // 2. Wrap the HTML in two distinct blocks to guarantee no CSS jumps
    TICKER_TRACK.innerHTML = `
      <div class="ticker-content">${combinedHtml}</div>
      <div class="ticker-content">${combinedHtml}</div>
    `;

    // 3. Reset animation to start fresh from the left side
    TICKER_TRACK.style.animation = 'none';
    TICKER_TRACK.offsetHeight; /* triggers reflow */
    TICKER_TRACK.style.animation = null;

    // 4. Fade OUT Welcome, Fade IN Ticker
    WELCOME_LAYER.classList.replace('visible', 'hidden');
    TICKER_LAYER.classList.replace('hidden', 'visible');
  } else {
    // If all feeds fail, show dimmed welcome message
    WELCOME_TEXT.classList.add('dimmed');
  }
}

// Sequence: Wait 4s on load to show Welcome, then fetch. Refresh every 30m.
setTimeout(fetchFeed, 4000);
setInterval(fetchFeed, 1800000);
</script>
</body>
</html>
