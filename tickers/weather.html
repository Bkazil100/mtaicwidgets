<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Vaughan Weather Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --card-bg: rgba(255, 255, 255, 0.03);
    --accent: #F5CA73;
    --fg: #FFFFFF;
    --dim: rgba(255, 255, 255, 0.6);
  }

  body {
    margin: 0; padding: 20px;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    box-sizing: border-box;
  }

  .widget {
    background: var(--card-bg);
    border: 1px solid rgba(245, 202, 115, 0.2);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 300px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .location {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .main-weather {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
  }

  .icon { font-size: 54px; margin: 10px 0; }
  
  .temp {
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 15px;
  }

  .stat-box { text-align: center; }
  .stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; display: block; }
  .stat-val { font-size: 14px; font-weight: 600; color: var(--fg); }

  .updated {
    font-size: 9px;
    color: var(--dim);
    margin-top: 20px;
    font-style: italic;
  }

  /* Pulse effect for the update dot */
  .dot {
    height: 6px; width: 6px;
    background-color: var(--accent);
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    box-shadow: 0 0 8px var(--accent);
  }
</style>
</head>
<body>

  <div class="widget">
    <div class="location">Vaughan, ON</div>
    
    <div class="main-weather">
      <div id="w-icon" class="icon">--</div>
      <div id="w-temp" class="temp">--°</div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-label">Wind</span>
        <span id="w-wind" class="stat-val">-- km/h</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Humidity</span>
        <span id="w-hum" class="stat-val">--%</span>
      </div>
    </div>

    <div class="updated">
      <span class="dot"></span>Last updated: <span id="w-time">--:--</span>
    </div>
  </div>

<script>
const WEATHER_URL = "https://api.open-meteo.com/v1/forecast?latitude=43.8361&longitude=-79.4982&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m&timezone=auto";

function getWeatherIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "☁️";
  if (code <= 48) return "🌫️";
  if (code <= 67) return "🌧️";
  if (code <= 77) return "❄️";
  return "⛈️";
}

async function updateWeather() {
  try {
    const res = await fetch(WEATHER_URL);
    const data = await res.json();
    
    document.getElementById('w-temp').innerText = Math.round(data.current.temperature_2m) + "°";
    document.getElementById('w-icon').innerText = getWeatherIcon(data.current.weather_code);
    document.getElementById('w-wind').innerText = Math.round(data.current.wind_speed_10m) + " km/h";
    document.getElementById('w-hum').innerText = data.current.relative_humidity_2m + "%";
    
    const now = new Date();
    document.getElementById('w-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    console.error("Weather update failed");
  }
}

updateWeather();
setInterval(updateWeather, 900000); // Update every 15 minutes
</script>
</body>
</html>
