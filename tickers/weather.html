<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Premium Welcome Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --accent: #F5CA73;
    --fg: #FFFFFF;
    --glass: rgba(255, 255, 255, 0.03);
    --border: rgba(245, 202, 115, 0.2);
  }

  body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: flex-start;
    height: 64px;
    width: 900px;
    overflow: hidden;
  }

  #main-container {
    display: flex;
    width: 100%;
    height: 100%;
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
    background: linear-gradient(90deg, var(--bg) 0%, var(--glass) 50%, var(--bg) 100%);
    opacity: 0;
    transition: opacity 1s ease;
  }

  #main-container.loaded { opacity: 1; }

  /* Section 1: LIVE CLOCK */
  .clock-section {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-width: 240px;
  }
  #time { font-size: 36px; font-weight: 800; color: var(--fg); letter-spacing: -1.5px; }
  #ampm { font-size: 14px; font-weight: 600; color: var(--accent); text-transform: uppercase; }

  /* Section 2: DATE & LOCATION */
  .date-section {
    flex-grow: 1;
    padding-left: 35px;
    border-left: 1px solid rgba(255,255,255,0.1);
    margin-left: 20px;
  }
  #date { font-size: 15px; font-weight: 600; color: var(--fg); display: block; margin-bottom: 2px; }
  .location { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

  /* Section 3: WEATHER CAPSULE */
  .weather-section {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--glass);
    padding: 10px 25px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  #w-icon { font-size: 28px; }
  .temp-group { line-height: 1.1; }
  #temp { font-size: 24px; font-weight: 800; color: var(--fg); }
  #condition { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; display: block; }

</style>
</head>
<body>

  <div id="main-container">
    <div class="clock-section">
      <span id="time">00:00:00</span>
      <span id="ampm">AM</span>
    </div>

    <div class="date-section">
      <span id="date">Thursday, March 26</span>
      <span class="location">Vaughan Studio • ON</span>
    </div>

    <div class="weather-section">
      <div id="w-icon">☀️</div>
      <div class="temp-group">
        <span id="temp">--°</span>
        <span id="condition">Loading...</span>
      </div>
    </div>
  </div>

<script>
  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    let m = now.getMinutes();
    let s = now.getSeconds();
    let ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    m = m < 10 ? '0' + m : m;
    s = s < 10 ? '0' + s : s;
    
    document.getElementById('time').innerText = `${h}:${m}:${s}`;
    document.getElementById('ampm').innerText = ampm;

    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);
  }

  const LAT = 43.8361, LON = -79.4982;
  const W_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code&timezone=auto`;

  function getIcon(code) {
    if (code === 0) return "☀️";
    if (code <= 3) return "☁️";
    if (code <= 48) return "🌫️";
    if (code <= 67) return "🌧️";
    if (code <= 77) return "❄️";
    return "⛈️";
  }

  function getDesc(code) {
    if (code === 0) return "Clear Sky";
    if (code <= 3) return "Partly Cloudy";
    if (code <= 48) return "Foggy";
    if (code <= 67) return "Rainy";
    if (code <= 77) return "Snowing";
    return "Stormy";
  }

  async function updateWeather() {
    try {
      const res = await fetch(W_URL);
      const data = await res.json();
      document.getElementById('temp').innerText = Math.round(data.current.temperature_2m) + "°";
      document.getElementById('w-icon').innerText = getIcon(data.current.weather_code);
      document.getElementById('condition').innerText = getDesc(data.current.weather_code);
      document.getElementById('main-container').classList.add('loaded');
    } catch(e) { console.error(e); }
  }

  setInterval(updateClock, 1000);
  updateClock();
  updateWeather();
  setInterval(updateWeather, 1800000);
</script>
</body>
</html>
