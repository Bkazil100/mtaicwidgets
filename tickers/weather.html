<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Weather Bar - Large</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --accent: #F5CA73;
    --fg: #FFFFFF;
  }

  body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60px; /* Target height */
    overflow: hidden;
  }

  #content {
    display: flex;
    align-items: center;
    gap: 15px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #content.loaded { opacity: 1; }

  .icon {
    font-size: 32px; /* Large emoji */
    display: flex;
    align-items: center;
  }

  .temp {
    font-size: 28px; /* High visibility temperature */
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .divider {
    width: 2px;
    height: 30px;
    background: rgba(255, 255, 255, 0.1);
  }

  .info-stack {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .label {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg);
    line-height: 1.1;
  }

  .sub-label {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

  <div id="content">
    <div id="w-icon" class="icon"></div>
    <div id="w-temp" class="temp">--°</div>
    
    <div class="divider"></div>

    <div class="info-stack">
      <div class="label">Vaughan, ON</div>
      <div id="w-time" class="sub-label">Updated --:--</div>
    </div>
  </div>

<script>
const WEATHER_URL = "https://api.open-meteo.com/v1/forecast?latitude=43.8361&longitude=-79.4982&current=temperature_2m,weather_code&timezone=auto";

function getWeatherIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "☁️";
  if (code <= 48) return "🌫️";
  if (code <= 67) return "🌧️";
  if (code <= 77) return "❄️";
  return "⛈️";
}

async function updateWeather() {
  try {
    const res = await fetch(WEATHER_URL);
    const data = await res.json();
    
    document.getElementById('w-temp').innerText = Math.round(data.current.temperature_2m) + "°";
    document.getElementById('w-icon').innerText = getWeatherIcon(data.current.weather_code);
    
    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('w-time').innerText = "Updated " + timeStr;
    
    document.getElementById('content').classList.add('loaded');
  } catch (e) {
    console.error("Weather update failed");
  }
}

updateWeather();
setInterval(updateWeather, 900000);
</script>
</body>
</html>
