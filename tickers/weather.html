<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Weather Dashboard - Left Aligned</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --accent: #F5CA73;
    --fg: #FFFFFF;
    --border: rgba(245, 202, 115, 0.15);
  }

  body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: flex-start; /* Left Aligned */
    height: 60px;
    overflow: hidden;
  }

  #container {
    display: flex;
    width: 650px;
    height: 100%;
    align-items: center;
    padding-left: 24px; /* Left Padding */
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #container.loaded { opacity: 1; }

  /* Current Weather Section */
  .current-box {
    display: flex;
    align-items: center;
    padding-right: 25px;
    border-right: 1px solid var(--border);
    gap: 15px;
  }

  .c-icon { font-size: 34px; }
  .c-temp { font-size: 30px; font-weight: 800; color: var(--accent); line-height: 1; }
  
  .c-details { display: flex; flex-direction: column; }
  .c-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .c-feel { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.4); text-transform: uppercase; }

  /* Forecast Section */
  .forecast-box {
    display: flex;
    gap: 35px; /* Spacing between forecast days */
    padding-left: 25px;
  }

  .f-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .f-name { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 3px; }
  .f-icon { font-size: 20px; margin-bottom: 2px; }
  .f-temps { font-size: 12px; font-weight: 600; }
  .high { color: var(--accent); }
  .low { color: rgba(255,255,255,0.3); margin-left: 4px; }
</style>
</head>
<body>

  <div id="container">
    <div class="current-box">
      <div id="cur-icon" class="c-icon"></div>
      <div class="c-details">
        <div class="c-label">Vaughan</div>
        <div id="cur-temp" class="c-temp">--°</div>
        <div id="cur-feel" class="c-feel">Feels --°</div>
      </div>
    </div>

    <div id="forecast" class="forecast-box">
      </div>
  </div>

<script>
const LAT = 43.8361, LON = -79.4982;
const URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,apparent_temperature,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=6`;

function getIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "☁️";
  if (code <= 48) return "🌫️";
  if (code <= 67) return "🌧️";
  if (code <= 77) return "❄️";
  return "⛈️";
}

async function update() {
  try {
    const res = await fetch(URL);
    const data = await res.json();
    
    // Set Current
    document.getElementById('cur-temp').innerText = Math.round(data.current.temperature_2m) + "°";
    document.getElementById('cur-feel').innerText = "Feels " + Math.round(data.current.apparent_temperature) + "°";
    document.getElementById('cur-icon').innerText = getIcon(data.current.weather_code);
    
    // Set Forecast (Next 4 Days)
    let fHtml = '';
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    
    for (let i = 1; i < 5; i++) {
      const date = new Date(data.daily.time[i] + 'T00:00');
      const dayName = days[date.getDay()];
      fHtml += `
        <div class="f-day">
          <span class="f-name">${dayName}</span>
          <span class="f-icon">${getIcon(data.daily.weather_code[i])}</span>
          <span class="f-temps">
            <span class="high">${Math.round(data.daily.temperature_2m_max[i])}°</span>
            <span class="low">${Math.round(data.daily.temperature_2m_min[i])}°</span>
          </span>
        </div>`;
    }
    
    document.getElementById('forecast').innerHTML = fHtml;
    document.getElementById('container').classList.add('loaded');
  } catch (e) { console.error(e); }
}

update();
setInterval(update, 1800000); // 30 min refresh
</script>
</body>
</html>
