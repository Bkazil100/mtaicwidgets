<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Vaughan Weather Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bar-bg: #080F17; --fg: #FFFFFF; --accent: #F5CA73; --height: 50px;
  }
  html, body { margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bar-bg); }
  #wrap { width: 100%; height: var(--height); position: relative; background: var(--bar-bg); display: flex; align-items: center; }
  
  .layer { position: absolute; width: 100%; display: flex; align-items: center; transition: opacity 0.6s ease; }
  #welcome-layer { justify-content: center; z-index: 10; }
  #ticker-layer { 
    z-index: 5; overflow: hidden; 
    -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
  }

  .ticker-track { display: flex; white-space: nowrap; will-change: transform; }
  .ticker-content { display: flex; flex-shrink: 0; align-items: center; }
  
  .weather-item { display: flex; align-items: center; padding-right: 6rem; }
  .meta { font-size: 10px; font-weight: 800; color: var(--bar-bg); background: var(--accent); padding: 3px 8px; border-radius: 3px; margin-right: 15px; text-transform: uppercase; }
  .headline { font-size: 16px; font-weight: 600; color: var(--fg); }
  
  .weather-temp { color: var(--accent); font-size: 18px; margin-right: 8px; }
  .weather-icon { font-size: 22px; margin-right: 12px; }

  .welcome-msg { color: var(--accent); font-size: 14px; font-weight: 600; }
  .hidden { opacity: 0; pointer-events: none; }
  .visible { opacity: 1; }
</style>
</head>
<body>
  <div id="wrap">
    <div id="welcome-layer" class="layer visible">
      <span id="welcome-text" class="welcome-msg">Loading Vaughan Weather...</span>
    </div>
    <div id="ticker-layer" class="layer hidden">
      <div id="ticker-track" class="ticker-track"></div>
    </div>
  </div>

<script>
// Vaughan, Ontario Coordinates
const WEATHER_URL = "https://api.open-meteo.com/v1/forecast?latitude=43.8361&longitude=-79.4982&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m&timezone=auto";

const TRACK = document.getElementById('ticker-track');
const W_LAYER = document.getElementById('welcome-layer');
const T_LAYER = document.getElementById('ticker-layer');

let posX = 0;
let speed = 1.0; // Slightly slower for better readability of weather stats
let animationId;

function getWeatherIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "☁️";
  if (code <= 48) return "🌫️";
  if (code <= 67) return "🌧️";
  if (code <= 77) return "❄️";
  return "⛈️";
}

function startMarquee() {
  const contentWidth = TRACK.firstElementChild.offsetWidth;
  function animate() {
    posX -= speed;
    if (Math.abs(posX) >= contentWidth) posX = 0;
    TRACK.style.transform = `translate3d(${posX}px, 0, 0)`;
    animationId = requestAnimationFrame(animate);
  }
  animate();
}

async function fetchWeather() {
  cancelAnimationFrame(animationId);
  T_LAYER.classList.replace('visible', 'hidden');
  W_LAYER.classList.replace('hidden', 'visible');

  try {
    const res = await fetch(WEATHER_URL);
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const humidity = data.current.relative_humidity_2m;
    const wind = Math.round(data.current.wind_speed_10m);
    const icon = getWeatherIcon(data.current.weather_code);

    // Creating three blocks of info to make the weather loop feel full
    const html = `
      <div class="weather-item">
        <span class="meta">VAUGHAN</span>
        <span class="weather-icon">${icon}</span>
        <span class="headline"><span class="weather-temp">${temp}°C</span> Currently in Vaughan</span>
      </div>
      <div class="weather-item">
        <span class="meta">WIND</span>
        <span class="headline">${wind} km/h</span>
      </div>
      <div class="weather-item">
        <span class="meta">HUMIDITY</span>
        <span class="headline">${humidity}%</span>
      </div>`;

    TRACK.innerHTML = `<div class="ticker-content">${html}</div><div class="ticker-content">${html}</div>`;
    posX = 0;
    
    setTimeout(() => {
      W_LAYER.classList.replace('visible', 'hidden');
      T_LAYER.classList.replace('hidden', 'visible');
      startMarquee();
    }, 800);
  } catch(e) {
    document.getElementById('welcome-text').innerText = "Weather Currently Unavailable";
  }
}

fetchWeather();
setInterval(fetchWeather, 1800000); // 30 min refresh
</script>
</body>
</html>
