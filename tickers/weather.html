<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MTA Weather Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080F17;
    --accent: #F5CA73;
    --fg: #FFFFFF;
  }

  body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 30px; /* Matches your iframe height */
    overflow: hidden;
  }

  .weather-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .icon {
    font-size: 16px;
    display: flex;
    align-items: center;
  }

  .temp {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }

  .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--fg);
  }

  /* Subtle fade-in when data loads */
  #content {
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.5s ease;
    opacity: 0;
  }
  
  #content.loaded { opacity: 1; }
</style>
</head>
<body>

  <div class="weather-bar">
    <div id="content">
      <span id="w-icon" class="icon"></span>
      <span id="w-temp" class="temp">--°C</span>
      <span class="label">Vaughan, ON</span>
    </div>
  </div>

<script>
const WEATHER_URL = "https://api.open-meteo.com/v1/forecast?latitude=43.8361&longitude=-79.4982&current=temperature_2m,weather_code&timezone=auto";

function getWeatherIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "☁️";
  if (code <= 48) return "🌫️";
  if (code <= 67) return "🌧️";
  if (code <= 77) return "❄️";
  return "⛈️";
}

async function updateWeather() {
  try {
    const res = await fetch(WEATHER_URL);
    const data = await res.json();
    
    document.getElementById('w-temp').innerText = Math.round(data.current.temperature_2m) + "°C";
    document.getElementById('w-icon').innerText = getWeatherIcon(data.current.weather_code);
    document.getElementById('content').classList.add('loaded');
  } catch (e) {
    console.error("Weather failed");
  }
}

updateWeather();
setInterval(updateWeather, 900000); // 15 min refresh
</script>
</body>
</html>
